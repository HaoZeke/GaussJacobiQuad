# To use:
#
#   $ mamba env create -f environment.yml
#   $ mamba activate gaussjacquad
#
# Release tooling (cocogitto / `cog`) is a Rust binary; install separately with:
#   cargo install cocogitto
# or download a release from https://github.com/cocogitto/cocogitto/releases
#
name: gaussjacquad
channels:
  - conda-forge
dependencies:
  - compilers
  - meson
  - gfortran
  - pkg-config
  - openblas
  - fpm
  - fprettify
  # Python, Sympy
  - ipython
  - sympy
  - numpy
  - jupytext
  - papermill
  - ipykernel
  # More testing
  - pytest
  # Headers
  - jinja2
  # Documentation
  - pandoc
  - doxygen==1.9.1 # for doxyYoda
  - graphviz # for dot
