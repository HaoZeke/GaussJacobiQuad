# DEPRECATED — version bumps are handled by cocogitto (`cog bump`).
# See RELEASE.md and cog.toml. This file is kept only so any external
# references fail loudly with a clear message.
#
# Migration: use `cog bump --auto` (or --minor / --patch / --major) instead of `tbump`.

[version]
current = "0.1.0"

regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  '''

[git]
message_template = "chore(release): prepare v{new_version}"
tag_template = "v{new_version}"

# Intentionally empty: do not run tbump file patches or towncrier.
# All versioned files are updated by cog pre_bump_hooks in cog.toml.
